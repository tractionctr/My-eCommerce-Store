{% extends "store/base.html" %}
{% block content %}

<h2>Register</h2>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div style="margin-bottom: 12px;">
            <label style="display: block; margin-bottom: 4px;">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}<small style="color: #9ca3af;">{{ field.help_text }}</small>{% endif %}
            {% for error in field.errors %}<span style="color: #f87171; font-size: 13px;">{{ error }}</span>{% endfor %}
        </div>
    {% endfor %}
    <button class="button" type="submit">Register</button>
</form>

{% endblock %}
