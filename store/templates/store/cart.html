{% extends 'store/base.html' %}
{% block content %}

<h2>Your Cart</h2>

{% if products %}
    {% for product in products %}
      <div class="card">
        {{ product.name }} - ${{ product.price }}
      </div>
    {% endfor %}

    <br>
    <a class="button" href="{% url 'checkout' %}">Checkout</a>
{% else %}
    <p>Your cart is empty.</p>
{% endif %}

{% endblock %}
