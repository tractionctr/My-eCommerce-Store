{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>My Store</title>
    <link rel="stylesheet" href="{% static 'store/style.css' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<header class="header">
    <div class="header-inner">

        <h1 class="logo">My eCommerce</h1>

        <nav class="nav-left">
            <a class="nav-link" href="{% url 'view_products' %}">Products</a>
            <a class="nav-link" href="{% url 'view_cart' %}">Cart</a>
            <a class="nav-link" href="{% url 'buyer_dashboard' %}">Stores</a>
            {% if user.is_vendor %}
                <a class="nav-link" href="{% url 'vendor_dashboard' %}">Dashboard</a>
            {% endif %}
            <a class="nav-link" href="{% url 'reddit_feed' %}">Reddit</a>
        </nav>

        <nav class="nav-right">
            {% if user.is_authenticated %}
                <span class="user-tag">{{ user.username }}</span>
                <a class="nav-link" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">Login</a>
                <a class="nav-link" href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>

    </div>
</header>

<main class="container">
    {% block content %}{% endblock %}
</main>

</body>
</html>
