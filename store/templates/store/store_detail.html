{% extends "store/base.html" %}
{% block content %}

<h2>{{ store.name }}</h2>

<a class="button" href="{% url 'vendor_dashboard' %}">Dashboard</a>
<a class="button" href="{% url 'add_product' %}">Add Product</a>

<h3>Products</h3>

{% for product in products %}
    <div class="card">
        {{ product.name }} - {{ product.price }}
    </div>
{% empty %}
    <p>No products</p>
{% endfor %}

{% endblock %}
